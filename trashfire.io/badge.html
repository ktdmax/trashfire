<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRASHFIRE - Claim Your Badge</title>
  <link rel="icon" href="icon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root{--bg:#0a0a12;--s:#151520;--s2:#1e1e2e;--b:#2a2a3d;--t:#e8e4d9;--m:#8884a0;--o:#f97316;--g:#4ade80;--r:#ef4444;--gold:#fbbf24;--parchment:#2c2820;--ink:#e8e4d9}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--t);padding:2rem;line-height:1.5;min-height:100vh}

    h1{font-family:'Press Start 2P',monospace;font-size:1.2rem;margin-bottom:.5rem;letter-spacing:1px}
    h1 em{color:var(--o);font-style:normal}
    .sub{color:var(--m);margin-bottom:2.5rem;font-size:.9rem}

    .layout{max-width:860px;margin:0 auto}

    /* Upload zone */
    .upload{border:2px dashed var(--b);border-radius:12px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:2rem}
    .upload:hover{border-color:var(--o);background:rgba(249,115,22,.03)}
    .upload.active{border-color:var(--g);background:rgba(74,222,128,.03)}
    .upload-icon{font-size:2rem;margin-bottom:.5rem}
    .upload-text{color:var(--m);font-size:.9rem}
    .upload-text b{color:var(--t)}
    .upload input{display:none}
    .upload-hint{font-size:.75rem;color:var(--m);margin-top:.75rem;font-family:monospace}

    /* Badge preview */
    .preview{display:none;flex-direction:column;align-items:center;gap:1.5rem}
    .preview.show{display:flex}
    .badge-frame{position:relative;padding:8px;border-radius:4px;image-rendering:pixelated}

    /* Buttons */
    .actions{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}
    .btn{padding:.6rem 1.2rem;border-radius:6px;font-size:.82rem;font-weight:600;border:none;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:.6rem;letter-spacing:.5px;transition:all .15s}
    .btn-o{background:var(--o);color:#fff}.btn-o:hover{opacity:.85}
    .btn-g{background:var(--s2);color:var(--t);border:1px solid var(--b)}.btn-g:hover{border-color:var(--m)}

    .verify{margin-top:1rem;font-family:monospace;font-size:.7rem;color:var(--m);text-align:center}
    .verify code{background:var(--s2);padding:.2rem .5rem;border-radius:4px;color:var(--gold)}

    .error{color:var(--r);font-size:.85rem;margin-top:1rem;text-align:center;display:none}
  </style>
</head>
<body>

<div class="layout">
  <h1><em>TRASHFIRE</em> BADGE</h1>
  <p class="sub">Drop your result.json to claim your badge. No faking - verified from run data.</p>

  <div class="upload" id="dropzone" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📂</div>
    <div class="upload-text">
      <b>Drop result.json here</b> or click to browse
    </div>
    <div class="upload-hint">_results/&lt;run-id&gt;/result.json or any scored report JSON</div>
    <input type="file" id="file-input" accept=".json">
  </div>

  <div class="error" id="error"></div>

  <div class="preview" id="preview">
    <div class="badge-frame" id="badge-container"></div>
    <div class="actions">
      <button class="btn btn-o" onclick="downloadPNG()">DOWNLOAD PNG</button>
      <button class="btn btn-g" onclick="downloadSVG()">DOWNLOAD SVG</button>
    </div>
    <div class="verify" id="verify-line"></div>
  </div>
</div>

<script>
// ── Drag & Drop ──
const dz = document.getElementById('dropzone');
const fi = document.getElementById('file-input');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('active'); });
dz.addEventListener('dragleave', () => dz.classList.remove('active'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('active'); handleFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', () => { if(fi.files[0]) handleFile(fi.files[0]); });

function handleFile(f) {
  const err = document.getElementById('error');
  err.style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      generateBadge(data);
    } catch(ex) {
      err.textContent = 'Invalid JSON: ' + ex.message;
      err.style.display = 'block';
    }
  };
  reader.readAsText(f);
}

// ── Verification Hash ──
async function hashData(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,12);
}

// ── Score tier ──
function tier(s) {
  if (s >= 80) return { label: "LEGENDARY", color: "#fbbf24", stars: 5 };
  if (s >= 60) return { label: "EPIC", color: "#a78bfa", stars: 4 };
  if (s >= 40) return { label: "SKILLED", color: "#4ade80", stars: 3 };
  if (s >= 20) return { label: "NOVICE", color: "#60a5fa", stars: 2 };
  return { label: "ROOKIE", color: "#8884a0", stars: 1 };
}

// ── Generate Badge SVG ──
async function generateBadge(data) {
  // Parse data - support both ProjectScoreReport and BenchmarkResult formats
  let model, skill, score, found, total, fp, project, cats;

  if (data.meta) {
    // BenchmarkResult format
    model = data.meta.model_display || data.meta.model || "Unknown";
    skill = data.meta.prompt_preset || "custom";
    score = (data.aggregate?.composite_score ?? 0) * 100;
    found = data.aggregate?.total_found ?? 0;
    total = data.aggregate?.total_issues ?? 100;
    fp = data.aggregate?.total_false_positives ?? 0;
    project = data.projects?.length > 1 ? "overall" : (data.projects?.[0]?.project ?? "unknown");
    cats = {};
  } else if (data.composite_score !== undefined) {
    // ProjectScoreReport format
    model = data.reviewer || "Unknown";
    skill = "scored";
    score = data.composite_score * 100;
    found = data.matched_issues ?? 0;
    total = data.total_issues ?? 100;
    fp = data.false_positives ?? 0;
    project = data.project || "unknown";
    cats = {};
    if (data.by_category) {
      Object.entries(data.by_category).forEach(([k,v]) => { cats[k] = v.normalized_score ?? v.recall ?? 0; });
    }
  } else if (data.reviewer && data.findings) {
    // Raw review output - can't generate badge from unscored data
    document.getElementById('error').textContent = "This is a raw review file (not scored). Run the scorer first, then use the report JSON.";
    document.getElementById('error').style.display = 'block';
    return;
  } else {
    document.getElementById('error').textContent = "Unrecognized format. Use a result.json from _results/ or a scored report JSON.";
    document.getElementById('error').style.display = 'block';
    return;
  }

  const t = tier(score);
  const verifyStr = `${model}|${skill}|${score.toFixed(1)}|${found}/${total}|${project}`;
  const hash = await hashData(JSON.stringify(data));

  const w = 480, h = 260;
  const stars = "★".repeat(t.stars) + "☆".repeat(5 - t.stars);

  // Category bars (if available)
  const catKeys = ["SEC","LOGIC","PERF","BP","SMELL","TRICKY"];
  const catLabels = {SEC:"SEC",LOGIC:"LOG",PERF:"PRF",BP:"BP",SMELL:"SML",TRICKY:"TRK"};
  const catColors = {SEC:"#ef4444",LOGIC:"#60a5fa",PERF:"#fbbf24",BP:"#a78bfa",SMELL:"#6b7280",TRICKY:"#f97316"};
  const hasCats = catKeys.some(k => (cats[k] ?? 0) > 0);

  const catBars = hasCats ? catKeys.map((k, i) => {
    const v = cats[k] ?? 0;
    const x = 24 + i * 72;
    return `
      <text x="${x+22}" y="208" font-family="'Press Start 2P',monospace" font-size="5" fill="#6b6b80" text-anchor="middle">${catLabels[k]}</text>
      <rect x="${x}" y="214" width="44" height="5" rx="1" fill="#1a1a2e"/>
      <rect x="${x}" y="214" width="${Math.max(1, v * 44)}" height="5" rx="1" fill="${catColors[k]}"/>
      <text x="${x+22}" y="228" font-family="'Press Start 2P',monospace" font-size="5" fill="${v > 0 ? catColors[k] : '#333'}" text-anchor="middle">${Math.round(v*100)}</text>
    `;
  }).join('') : '';

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <defs>
    <filter id="crt"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="0.5" xChannelSelector="R" yChannelSelector="G"/></filter>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,0.03)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient>
  </defs>

  <!-- Outer pixel border -->
  <rect x="0" y="0" width="${w}" height="${h}" rx="2" fill="#0e0e18"/>
  <rect x="2" y="2" width="${w-4}" height="${h-4}" rx="1" fill="${t.color}" opacity="0.15"/>
  <rect x="4" y="4" width="${w-8}" height="${h-8}" rx="1" fill="#12121e"/>
  <rect x="6" y="6" width="${w-12}" height="${h-12}" fill="#151522"/>
  <rect x="6" y="6" width="${w-12}" height="${h-12}" fill="url(#shine)"/>

  <!-- Corner pixels -->
  <rect x="4" y="4" width="4" height="4" fill="${t.color}" opacity="0.4"/>
  <rect x="${w-8}" y="4" width="4" height="4" fill="${t.color}" opacity="0.4"/>
  <rect x="4" y="${h-8}" width="4" height="4" fill="${t.color}" opacity="0.4"/>
  <rect x="${w-8}" y="${h-8}" width="4" height="4" fill="${t.color}" opacity="0.4"/>

  <!-- Header bar -->
  <rect x="6" y="6" width="${w-12}" height="28" fill="#1a1a2e"/>
  <line x1="6" y1="34" x2="${w-6}" y2="34" stroke="${t.color}" stroke-width="1" opacity="0.3"/>

  <!-- Pixel fire icon -->
  <rect fill="#f97316" x="14" y="12" width="4" height="4"/>
  <rect fill="#fb923c" x="18" y="14" width="3" height="3"/>
  <rect fill="#fbbf24" x="16" y="14" width="2" height="2"/>
  <rect fill="#3f3f46" x="12" y="18" width="10" height="8"/>
  <rect fill="#52525b" x="14" y="20" width="2" height="4"/>
  <rect fill="#52525b" x="18" y="20" width="2" height="4"/>

  <!-- TRASHFIRE header -->
  <text x="30" y="24" font-family="'Press Start 2P',monospace" font-size="8" fill="#f97316">TRASH</text>
  <text x="75" y="24" font-family="'Press Start 2P',monospace" font-size="8" fill="${t.color}">FIRE</text>

  <!-- Tier label -->
  <text x="${w-20}" y="24" font-family="'Press Start 2P',monospace" font-size="7" fill="${t.color}" text-anchor="end" opacity="0.5">${t.label}</text>

  <!-- Stars -->
  <text x="24" y="54" font-family="sans-serif" font-size="16" fill="${t.color}" letter-spacing="3">${stars}</text>

  <!-- Model name -->
  <text x="24" y="80" font-family="'Press Start 2P',monospace" font-size="10" fill="${t.color}">${model}</text>

  <!-- Skill + project -->
  <text x="24" y="98" font-family="monospace" font-size="10" fill="#6b6b80">${skill} // ${project}</text>

  <!-- Score -->
  <text x="24" y="142" font-family="'Press Start 2P',monospace" font-size="32" fill="${t.color}" letter-spacing="2">${score.toFixed(1)}<tspan font-size="18" dy="-4">%</tspan></text>

  <!-- Score bar -->
  <rect x="24" y="154" width="320" height="8" rx="2" fill="#1a1a2e"/>
  <rect x="24" y="154" width="${Math.max(2, score/100*320)}" height="8" rx="2" fill="${t.color}"/>

  <!-- Found / FP -->
  <text x="360" y="132" font-family="'Press Start 2P',monospace" font-size="12" fill="${t.color}">${found}<tspan font-size="7" fill="#6b6b80">/${total}</tspan></text>
  <text x="360" y="146" font-family="monospace" font-size="8" fill="#6b6b80">found</text>
  <text x="420" y="146" font-family="monospace" font-size="8" fill="${fp > 20 ? '#ef4444' : '#6b6b80'}">${fp} FP</text>

  <!-- Category mini-bars -->
  ${catBars}

  <!-- Verification hash -->
  <text x="${w-20}" y="${h-14}" font-family="monospace" font-size="7" fill="#333" text-anchor="end">verify: ${hash}</text>

  <!-- trashfire.io -->
  <text x="24" y="${h-14}" font-family="'Press Start 2P',monospace" font-size="6" fill="#4a4a5e">trashfire.io</text>
</svg>`;

  document.getElementById('badge-container').innerHTML = svg;
  document.getElementById('preview').classList.add('show');
  document.getElementById('verify-line').innerHTML = `Verification hash: <code>${hash}</code> (derived from result data)`;

  // Store SVG for downloads
  window._currentSVG = svg;
}

function downloadSVG() {
  if (!window._currentSVG) return;
  const a = document.createElement('a');
  a.href = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(window._currentSVG);
  a.download = 'trashfire-badge.svg';
  a.click();
}

function downloadPNG() {
  if (!window._currentSVG) return;
  const canvas = document.createElement('canvas');
  canvas.width = 960; canvas.height = 520;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 960, 520);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'trashfire-badge.png';
    a.click();
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(window._currentSVG)));
}
</script>
</body>
</html>

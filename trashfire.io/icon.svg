<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pixelated trash can with fire -->
  <style>
    .d{fill:#27272a}.f1{fill:#f97316}.f2{fill:#fb923c}.f3{fill:#fbbf24}.m{fill:#3f3f46}.h{fill:#52525b}
  </style>
  <!-- Lid -->
  <rect class="h" x="6" y="4" width="20" height="2"/>
  <rect class="h" x="12" y="2" width="8" height="2"/>
  <!-- Can body -->
  <rect class="d" x="8" y="6" width="16" height="14"/>
  <rect class="m" x="10" y="8" width="2" height="10"/>
  <rect class="m" x="15" y="8" width="2" height="10"/>
  <rect class="m" x="20" y="8" width="2" height="10"/>
  <!-- Fire from top -->
  <rect class="f1" x="10" y="0" width="4" height="4"/>
  <rect class="f2" x="16" y="1" width="3" height="3"/>
  <rect class="f3" x="12" y="1" width="2" height="2"/>
  <rect class="f1" x="19" y="0" width="2" height="2"/>
  <!-- Fire from bottom/sides -->
  <rect class="f1" x="8" y="20" width="4" height="4"/>
  <rect class="f2" x="12" y="22" width="3" height="4"/>
  <rect class="f1" x="16" y="20" width="4" height="6"/>
  <rect class="f3" x="20" y="21" width="4" height="3"/>
  <rect class="f2" x="6" y="22" width="3" height="4"/>
  <rect class="f3" x="22" y="24" width="2" height="4"/>
  <rect class="f1" x="14" y="26" width="4" height="4"/>
  <rect class="f2" x="10" y="26" width="3" height="2"/>
  <rect class="f3" x="18" y="28" width="3" height="2"/>
</svg>

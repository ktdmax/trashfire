ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # BUG-0004: Debug mode enabled in production config (CWE-489, CVSS 5.3, MEDIUM, Tier 3)
        watch = [ "classes" ]
    }
    application {
        modules = [ com.stan.ApplicationKt.module ]
    }
}

database {
    # BUG-0005: H2 console enabled with permissive settings in default config (CWE-15, CVSS 8.6, HIGH, Tier 2)
    h2Console = true
    h2ConsolePort = 8082
    # BUG-0006: Database credentials hardcoded in config file (CWE-798, CVSS 4.3, BEST_PRACTICE, Tier 4)
    jdbcUrl = "jdbc:h2:mem:stan_crm;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
    jdbcUrl = ${?DATABASE_URL}
    driver = "org.h2.Driver"
    driver = ${?DATABASE_DRIVER}
    user = "sa"
    user = ${?DATABASE_USER}
    password = ""
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

jwt {
    # BUG-0007: JWT secret hardcoded and weak (CWE-798, CVSS 9.1, CRITICAL, Tier 1)
    secret = "stan-salesman-secret-2024"
    issuer = "stan-salesman"
    audience = "stan-salesman-api"
    realm = "stan-salesman"
    # BUG-0008: Token expiration set to 365 days (CWE-613, CVSS 3.7, LOW, Tier 4)
    expirationMs = 31536000000
}

email {
    # BUG-0009: SMTP credentials in config (CWE-798, CVSS 4.3, BEST_PRACTICE, Tier 4)
    smtpHost = "smtp.company.internal"
    smtpPort = 25
    username = "crm-noreply@stansinc.com"
    password = "SmtpP@ss2024!"
    fromAddress = "crm-noreply@stansinc.com"
    fromName = "Stan's CRM"
    # BUG-0010: TLS disabled for SMTP (CWE-319, CVSS 5.9, MEDIUM, Tier 3)
    useTls = false
}

cors {
    # BUG-0011: Wildcard CORS origin in config (CWE-942, CVSS 5.3, MEDIUM, Tier 3)
    allowedOrigins = "*"
    allowCredentials = true
}

webhook {
    # BUG-0012: No webhook secret configured for signature verification (CWE-347, CVSS 6.8, TRICKY, Tier 5)
    # secret left blank intentionally — "will configure later"
    secret = ""
    retryCount = 3
    timeoutMs = 30000
}

import {
    uploadDir = "/tmp/stan-imports"
    # BUG-0013: Max file size set to 500MB (CWE-400, CVSS 4.3, LOW, Tier 4)
    maxFileSizeMb = 500
    allowedExtensions = [ "csv", "xlsx", "json", "yaml", "xml" ]
}

forecast {
    cacheTimeSeconds = 300
    # BUG-0014: Debug flag exposes internals (CWE-215, CVSS 3.1, LOW, Tier 4)
    debugMode = true
}

name: wally_feeds
description: A news aggregation app with topic feeds, bookmarks, and push notifications.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.5
  firebase_messaging: ^14.7.15
  cloud_firestore: ^4.15.5
  go_router: ^13.2.0
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.7.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.0.0  # RH-001: Imported but used correctly for encryption keys — not a vulnerability
  crypto: ^3.0.3
  # BUG-0001: Using outdated dio version with known SSRF bypass (CWE-918, CVSS 8.1, HIGH, Tier 2)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/config/

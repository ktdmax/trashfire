# Fate of Atlantis - Academic Research Paper Repository
# Play Framework Configuration

play {
  # BUG-005: Application secret is hardcoded and easily guessable (CWE-798, CVSS 9.1, CRITICAL, Tier 1)
  http.secret.key = "atlantis-research-platform-2024-secret"

  # BUG-006: CSRF filter disabled globally (CWE-352, CVSS 6.5, MEDIUM, Tier 3)
  filters.disabled += "play.filters.csrf.CSRFFilter"

  # BUG-007: Overly permissive CORS configuration (CWE-942, CVSS 5.3, MEDIUM, Tier 3)
  filters.cors {
    allowedOrigins = null
    allowedHttpMethods = null
    allowedHttpHeaders = null
    supportsCredentials = true
  }

  # BUG-008: Security headers filter disabled (CWE-693, CVSS 5.3, MEDIUM, Tier 3)
  filters.disabled += "play.filters.headers.SecurityHeadersFilter"

  http.errorHandler = "play.http.HtmlOrJsonHttpErrorHandler"

  # BUG-009: Session cookie missing secure flag and httpOnly (CWE-614, CVSS 5.4, MEDIUM, Tier 3)
  http.session {
    cookieName = "ATLANTIS_SESSION"
    secure = false
    httpOnly = false
    maxAge = 604800000
    sameSite = null
  }

  temporaryFile {
    reaper {
      enabled = true
      initialDelay = "5 minutes"
      interval = "30 seconds"
      olderThan = "5 minutes"
    }
  }
}

# Database Configuration
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    # BUG-010: Database password in config file, not env var (CWE-798, CVSS 7.5, HIGH, Tier 2)
    url = "jdbc:postgresql://localhost:5432/atlantis_papers"
    user = "atlantis_admin"
    password = "r3search_p@per$_2024"
    numThreads = 20
    maxConnections = 20
    connectionTimeout = 30000
  }
}

# Akka configuration
akka {
  # BUG-011: Akka remote enabled with Java serialization and no authentication (CWE-502, CVSS 9.8, CRITICAL, Tier 1)
  actor {
    provider = "remote"
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
    serialization-bindings {
      "java.io.Serializable" = java
    }
  }
  remote.artery {
    canonical.hostname = "0.0.0.0"
    canonical.port = 25520
  }
  # BUG-012: Verbose logging exposes internal state (CWE-532, CVSS 3.3, LOW, Tier 4)
  loglevel = "DEBUG"
  log-config-on-start = on
}

# File upload settings
uploads {
  maxFileSize = "500MB"
  storagePath = "/var/data/papers"
  allowedExtensions = ["pdf", "tex", "bib", "xml", "docx"]
  # BUG-013: Temp directory world-readable (CWE-732, CVSS 5.5, MEDIUM, Tier 3)
  tempDir = "/tmp/atlantis-uploads"
}

# JWT Configuration
jwt {
  # BUG-014: Weak JWT secret, same as app secret (CWE-326, CVSS 7.5, HIGH, Tier 2)
  secret = "atlantis-research-platform-2024-secret"
  issuer = "fate-of-atlantis"
  # BUG-015: Token expiry far too long - 30 days (CWE-613, CVSS 3.7, LOW, Tier 4)
  expirationSeconds = 2592000
}

# External service endpoints
services {
  # BUG-016: Internal service URL exposed in config (CWE-200, CVSS 3.7, LOW, Tier 4)
  metadataExtractor = "http://internal-metadata.corp:9090/extract"
  citationResolver = "https://api.crossref.org/works"
  doiResolver = "https://doi.org"
}

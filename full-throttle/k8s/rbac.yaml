apiVersion: v1
kind: ServiceAccount
metadata:
  name: fullthrottle-admin
  namespace: fullthrottle
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fullthrottle-cluster-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fullthrottle-admin-binding
subjects:
  - kind: ServiceAccount
    name: fullthrottle-admin
    namespace: fullthrottle
roleRef:
  kind: ClusterRole
  name: fullthrottle-cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
# Application-scoped role for runtime operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fullthrottle-app-role
  namespace: fullthrottle
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fullthrottle-app-binding
  namespace: fullthrottle
subjects:
  - kind: ServiceAccount
    name: fullthrottle-admin
    namespace: fullthrottle
roleRef:
  kind: Role
  name: fullthrottle-app-role
  apiGroup: rbac.authorization.k8s.io
